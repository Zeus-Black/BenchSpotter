services:
  proxy:
    image: nginx:alpine
    container_name: benchspotter-proxy
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: benchspotter-frontend
    restart: always
    environment:
      - API_URL=/api
    expose:
      - "80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: benchspotter-backend
    restart: always
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    expose:
      - "8000"
