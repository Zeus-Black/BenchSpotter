<!DOCTYPE html>
<html>
<head>
    <title>BenchSpotter</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Control Geocoder uniquement -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS général -->
    <link rel="stylesheet" href="style.css">

    <script src="script.js" defer></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <i class="fas fa-chair"></i>
            <span>BenchSpotter</span>
        </div>
        
        <div class="header-actions">
            <div class="stats-badge">
                <i class="fas fa-chair"></i>
                <span class="bench-count">0</span> bancs
            </div>
            <button class="info-btn" id="info-btn">
                <i class="fas fa-info-circle"></i>
                Infos
            </button>
        </div>
    </header>

    <button id="add-bench-btn">
        <i class="fas fa-plus"></i>
        Ajouter un banc
    </button>
    
    <div id="map"></div>

    <!-- Info Modal -->
    <div class="modal" id="info-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-chair"></i>
                    BenchSpotter
                </h2>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            
            <div class="modal-body">
                <div class="version-badge">v1.0.0-dev</div>
                
                <p class="modal-description">
                    Projet collaboratif pour cartographier les bancs ayant les plus belles vues.
                </p>

                <p class="modal-description">
                    Site développé par <strong>Lucas Lantrua</strong> et <strong>Colin Ledru</strong>
                </p>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <i class="fas fa-chair stat-icon"></i>
                        <div>
                            <div class="stat-number bench-count">0</div>
                            <div class="stat-label">Bancs référencés</div>
                        </div>
                    </div>
                </div>
                
                <div class="links-section">
                    <h3>Liens utiles</h3>
                    <div class="links-grid">
                        <a href="mailto:contact@benchspotter.live" class="link-item">
                            <i class="fas fa-envelope"></i>
                            Contact
                        </a>
                        <a href="https://github.com/Zeus-Black/BenchSpotter/issues" target="_blank" class="link-item">
                            <i class="fas fa-bug"></i>
                            Signaler un bug
                        </a>
                        <a href="https://github.com/Zeus-Black/BenchSpotter" target="_blank" class="link-item">
                            <i class="fab fa-github"></i>
                            Contribuer
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
