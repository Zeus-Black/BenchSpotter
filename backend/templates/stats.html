<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Statistiques</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4 bg-light">
  <div class="container">
    <h1 class="mb-4">📊 Statistiques du site</h1>
    <a href="/admin" class="btn btn-outline-secondary mb-3">← Retour</a>

    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
          <div class="card-body">
            <h5 class="card-title">Total de bancs</h5>
            <p class="card-text" id="total-benches">...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
          <div class="card-body">
            <h5 class="card-title">Total de commentaires</h5>
            <p class="card-text" id="total-comments">...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-white bg-warning mb-3">
          <div class="card-body">
            <h5 class="card-title">Note moyenne</h5>
            <p class="card-text" id="average-note">...</p>
          </div>
        </div>
      </div>
    </div>

    <h4>📈 Commentaires par banc</h4>
    <canvas id="chart-comments" width="400" height="200"></canvas>
  </div>

  <script>
    axios.get("/admin/stats/data").then(res => {
      const data = res.data;
      document.getElementById("total-benches").textContent = data.total_benches;
      document.getElementById("total-comments").textContent = data.total_comments;
      document.getElementById("average-note").textContent = data.average_note.toFixed(1);

      const ctx = document.getElementById('chart-comments').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.comments_per_bench.map(b => `Banc ${b.bench_id}`),
          datasets: [{
            label: 'Nombre de commentaires',
            data: data.comments_per_bench.map(b => b.count),
            backgroundColor: '#3498db'
          }]
        },
        options: {
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }).catch(err => {
      alert("Erreur lors du chargement des statistiques.");
      console.error(err);
    });
  </script>
</body>
</html>
