<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin - Bancs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="container py-4">
  <h1 class="mb-4">🛠 Portail d'administration</h1>
  <div class="d-flex gap-2 align-items-center mb-4">
    <a href="/admin/stats" class="btn btn-outline-primary">
      📊 Statistiques
    </a>
    <a href="/logout" class="btn btn-secondary">
      Se déconnecter
    </a>
  </div>
  <div class="table-responsive">
    <table class="table table-bordered align-middle" id="benches">
      <thead class="table-light">
        <tr>
          <th>ID</th><th>Lat</th><th>Lng</th><th>Note</th><th>Description</th><th>Image</th><th>Commentaires</th><th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function fetchBenches() {
      const res = await axios.get('/admin/benches');
      const table = document.querySelector('#benches tbody');
      for (const b of res.data) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${b.id}</td>
          <td>${b.latitude.toFixed(4)}</td>
          <td>${b.longitude.toFixed(4)}</td>
          <td>${b.note ?? "-"}</td>
          <td>${b.description || ""}</td>
          <td>${b.image ? `<img src='/static/${b.image}' class="thumbnail" alt="Image du banc">` : ""}</td>
          <td id="comments-${b.id}">Chargement...</td>
          <td>
            <button class="btn btn-sm btn-danger" onclick="deleteBench(${b.id})">🗑 Supprimer</button>
          </td>
        `;
        table.appendChild(row);
        fetchComments(b.id);
      }
    }

    async function fetchComments(benchId) {
      try {
        const res = await axios.get(`/api/benches/${benchId}/comments`);
        const cell = document.getElementById(`comments-${benchId}`);
        cell.innerHTML = "";
        res.data.forEach(c => {
          const p = document.createElement("p");
          p.className = "comment";
          p.innerHTML = `<span class="comment-author">${c.author}</span> : ${c.content}
            <button class="btn btn-sm btn-outline-danger ms-2" onclick="deleteComment(${benchId}, ${c.id})">✖</button>`;
          cell.appendChild(p);
        });
      } catch (err) {
        console.warn("Erreur fetch comments", err);
      }
    }

    async function deleteBench(id) {
      if (!confirm("Supprimer ce banc ?")) return;
      try {
        await axios.delete(`/api/benches/${id}`);
        location.reload();
      } catch (err) {
        alert("Erreur à la suppression");
      }
    }

    async function deleteComment(benchId, commentId) {
      if (!confirm("Supprimer ce commentaire ?")) return;
      try {
        await axios.delete(`/api/benches/${benchId}/comments/${commentId}`);
        fetchComments(benchId);
      } catch (err) {
        alert("Erreur à la suppression du commentaire");
      }
    }

    fetchBenches();
  </script>
</body>
</html>
