services:
  proxy:
    image: nginx:alpine
    container_name: benchspotter-proxy-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: benchspotter-frontend-dev
    environment:
      - API_URL=/api
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    expose:
      - "80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: benchspotter-backend-dev
    working_dir: /app
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    expose:
      - "8000"
